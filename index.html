<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Casa Margarita</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f7f1e8;
  --text:#342619;
  --muted:#9a7349;
  --white:#fffaf2;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  width:100%;
  min-height:100%;
  overflow-x:hidden;
  background:var(--bg);
  color:var(--text);
}

body{
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at 50% 18%,#fffaf3 0%,#f7f1e8 58%,#efe0cd 100%);
}

.screen{
  width:100vw;
  max-width:430px;
  min-height:100vh;
  min-height:100dvh;
  padding:30px 24px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

.brand{
  margin:0;
  font-family:"Cormorant Garamond",serif;
  font-size:clamp(38px,11vw,50px);
  line-height:.95;
  letter-spacing:clamp(5px,1.8vw,9px);
  font-weight:400;
  white-space:normal;
}

.location{
  margin-top:18px;
  font-family:"Montserrat",sans-serif;
  font-size:12px;
  letter-spacing:6px;
  color:var(--muted);
}

.instruction{
  margin-top:38px;
  margin-bottom:20px;
  min-height:54px;
  font-family:"Montserrat",sans-serif;
  font-size:14px;
  line-height:1.75;
  letter-spacing:5px;
}

.pin-display{
  height:22px;
  margin-bottom:22px;
  display:flex;
  gap:13px;
  justify-content:center;
  align-items:center;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  border:1px solid var(--muted);
  opacity:.75;
}

.dot.filled{
  background:var(--muted);
}

.keypad{
  width:min(284px, calc(100vw - 56px));
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:13px;
}

.key{
  width:100%;
  aspect-ratio:1 / .82;
  border:0;
  border-radius:18px;
  background:linear-gradient(145deg,#d8bd96,#a9845e);
  color:var(--white);
  font-family:"Cormorant Garamond",serif;
  font-size:38px;
  line-height:1;
  box-shadow:
    0 10px 20px rgba(70,43,18,.18),
    inset 0 5px 10px rgba(255,255,255,.22),
    inset 0 -8px 14px rgba(55,33,14,.22);
  cursor:pointer;
  transition:transform .12s ease,filter .12s ease;
}

.key:active{
  transform:translateY(4px) scale(.98);
  filter:brightness(.95);
}

.key.enter{
  font-family:"Montserrat",sans-serif;
  font-size:22px;
}

.key.clear{
  font-family:"Montserrat",sans-serif;
  font-size:24px;
}

.button-shell{
  display:none;
  position:relative;
  width:min(278px, calc(100vw - 70px));
  aspect-ratio:1 / 1;
  border-radius:50%;
}

.button-shell::before{
  content:"";
  position:absolute;
  inset:-14px;
  border-radius:50%;
  background:linear-gradient(145deg,#dec49d,#a8835d);
  box-shadow:
    0 24px 42px rgba(70,43,18,.28),
    inset 0 7px 12px rgba(255,255,255,.38),
    inset 0 -11px 18px rgba(68,41,17,.24);
}

.gate-button{
  position:relative;
  width:100%;
  height:100%;
  border-radius:50%;
  border:0;
  background:
    radial-gradient(circle at 42% 32%,rgba(255,255,255,.14),transparent 34%),
    linear-gradient(145deg,#d3b58d,#b99368 56%,#87623d);
  color:var(--white);
  box-shadow:
    inset 0 8px 16px rgba(255,255,255,.22),
    inset 0 -13px 24px rgba(55,33,14,.28);
  transform:translateY(7px) scale(.985);
}

.state{
  display:block;
  font-family:"Montserrat",sans-serif;
  font-size:18px;
  letter-spacing:5px;
  margin-bottom:10px;
  font-weight:500;
}

.count{
  display:block;
  font-family:"Montserrat",sans-serif;
  font-size:82px;
  letter-spacing:2px;
  line-height:.9;
  font-weight:300;
}

.seconds{
  display:block;
  font-family:"Montserrat",sans-serif;
  font-size:17px;
  letter-spacing:4px;
  margin-top:12px;
}

.footer{
  margin-top:38px;
  font-family:"Montserrat",sans-serif;
  font-size:10px;
  letter-spacing:4px;
  color:var(--muted);
  line-height:1.8;
  max-width:300px;
}

.footer-daisy{
  margin-top:12px;
  color:var(--muted);
}

.daisy{
  width:21px;
  height:21px;
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-7px)}
  75%{transform:translateX(7px)}
}

.shake{
  animation:shake .25s ease;
}

@media(max-height:760px){
  .screen{padding:22px 24px}
  .brand{font-size:38px;letter-spacing:6px}
  .location{margin-top:14px;font-size:11px}
  .instruction{margin-top:26px;margin-bottom:16px;font-size:12px;min-height:44px}
  .pin-display{margin-bottom:16px}
  .keypad{width:min(248px, calc(100vw - 56px));gap:10px}
  .key{border-radius:15px;font-size:32px}
  .button-shell{width:min(238px, calc(100vw - 70px))}
  .count{font-size:70px}
  .footer{margin-top:28px;font-size:9px}
}
</style>
</head>

<body>
<main class="screen">
  <h1 class="brand">CASA<br>MARGARITA</h1>
  <div class="location">JALISCO · MÉXICO</div>

  <div id="instruction" class="instruction">
    INGRESA TU CÓDIGO<br>DE ACCESO
  </div>

  <div id="pinDisplay" class="pin-display">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>

  <div id="keypad" class="keypad">
    <button class="key" type="button" data-key="1">1</button>
    <button class="key" type="button" data-key="2">2</button>
    <button class="key" type="button" data-key="3">3</button>
    <button class="key" type="button" data-key="4">4</button>
    <button class="key" type="button" data-key="5">5</button>
    <button class="key" type="button" data-key="6">6</button>
    <button class="key" type="button" data-key="7">7</button>
    <button class="key" type="button" data-key="8">8</button>
    <button class="key" type="button" data-key="9">9</button>
    <button class="key clear" type="button" data-action="clear">⌫</button>
    <button class="key" type="button" data-key="0">0</button>
    <button class="key enter" type="button" data-action="enter">↵</button>
  </div>

  <div id="buttonShell" class="button-shell">
    <button class="gate-button" type="button" disabled>
      <span id="buttonContent">
        <span class="state">ABRIENDO</span>
        <span class="count">60</span>
        <span class="seconds">SEG</span>
      </span>
    </button>
  </div>

  <div class="footer">GRACIAS POR ELEGIR CASA MARGARITA</div>

  <div class="footer-daisy">
    <svg class="daisy" viewBox="0 0 64 64" aria-hidden="true">
      <g fill="none" stroke="currentColor" stroke-width="3">
        <ellipse cx="32" cy="12" rx="6" ry="11"/>
        <ellipse cx="32" cy="52" rx="6" ry="11"/>
        <ellipse cx="12" cy="32" rx="11" ry="6"/>
        <ellipse cx="52" cy="32" rx="11" ry="6"/>
        <ellipse cx="18" cy="18" rx="6" ry="11" transform="rotate(-45 18 18)"/>
        <ellipse cx="46" cy="46" rx="6" ry="11" transform="rotate(-45 46 46)"/>
        <ellipse cx="46" cy="18" rx="6" ry="11" transform="rotate(45 46 18)"/>
        <ellipse cx="18" cy="46" rx="6" ry="11" transform="rotate(45 18 46)"/>
        <circle cx="32" cy="32" r="6"/>
      </g>
    </svg>
  </div>
</main>

<script>
const ACCESS_CODE = "1662";
const WORKER_URL = "https://porton.aldo-capibara.workers.dev/press?token=casa-margarita-2026";

const instruction = document.getElementById("instruction");
const keypad = document.getElementById("keypad");
const pinDisplay = document.getElementById("pinDisplay");
const dots = Array.from(pinDisplay.querySelectorAll(".dot"));
const buttonShell = document.getElementById("buttonShell");
const content = document.getElementById("buttonContent");

let pin = "";
let running = false;
let countdownInterval = null;
let closeTimeout = null;
let activeSession = null;

keypad.addEventListener("click", event => {
  const btn = event.target.closest("button");
  if (!btn || !keypad.contains(btn) || running) return;

  const key = btn.dataset.key;
  const action = btn.dataset.action;

  if (key && pin.length < 4) {
    pin += key;
    updateDots();
    if (navigator.vibrate) navigator.vibrate(18);
  }

  if (action === "clear") {
    pin = pin.slice(0,-1);
    updateDots();
    if (navigator.vibrate) navigator.vibrate(20);
  }

  if (action === "enter") validatePin();
});

function updateDots(){
  dots.forEach((dot,i)=>dot.classList.toggle("filled",i<pin.length));
}

async function validatePin(){
  if(pin !== ACCESS_CODE){
    pin="";
    updateDots();
    showKeypadMessage("CÓDIGO INCORRECTO<br>INTENTA DE NUEVO");
    return;
  }

  running=true;
  pin="";
  updateDots();

  const started = await startGateCycle();

  if(started === "busy"){
    running=false;
    showKeypadMessage("PORTÓN EN USO<br>ESPERA UN MOMENTO");
    return;
  }

  if(!started){
    running=false;
    showKeypadMessage("INTENTA DE NUEVO<br>EN UN MOMENTO");
    return;
  }

  keypad.style.display="none";
  pinDisplay.style.display="none";
  buttonShell.style.display="block";

  if(navigator.vibrate) navigator.vibrate(60);

  startCountdown();
}

async function startGateCycle(){
  try{
    const res = await fetch(WORKER_URL + "&action=start",{method:"GET",cache:"no-store"});
    const data = await res.json();

    if(data.busy) return "busy";
    if(!data.ok) return false;

    activeSession = data.session;
    return true;
  }catch{
    return false;
  }
}

async function closeGateCycle(){
  if(!activeSession) return false;

  try{
    const res = await fetch(WORKER_URL + "&action=close&session=" + encodeURIComponent(activeSession),{method:"GET",cache:"no-store"});
    const data = await res.json();
    return Boolean(data.ok);
  }catch{
    return false;
  }
}

function startCountdown(){
  const startTime = Date.now();
  const totalDuration = 60000;
  const closeDelay = 40000;

  updateCountdown(60);

  closeTimeout = setTimeout(async()=>{
    updateCountdown(20);
    if(navigator.vibrate) navigator.vibrate([40,60,40]);

    const closed = await closeGateCycle();
    if(!closed) showError();
  }, closeDelay);

  countdownInterval = setInterval(()=>{
    const elapsed = Date.now() - startTime;
    const remaining = Math.max(0, Math.ceil((totalDuration - elapsed) / 1000));

    updateCountdown(remaining);

    if(remaining <= 0){
      clearAllTimers();
      setTimeout(resetToKeypad,900);
    }
  },250);
}

function updateCountdown(time){
  const state = time > 20 ? "ABRIENDO" : "CERRANDO";
  instruction.innerHTML = `${state}<br>PORTÓN`;

  content.innerHTML = `
    <span class="state">${state}</span>
    <span class="count">${String(time).padStart(2,"0")}</span>
    <span class="seconds">SEG</span>
  `;
}

function showKeypadMessage(message){
  instruction.innerHTML = message;
  keypad.classList.remove("shake");
  void keypad.offsetWidth;
  keypad.classList.add("shake");

  if(navigator.vibrate) navigator.vibrate([60,40,60]);

  setTimeout(()=>{
    instruction.innerHTML="INGRESA TU CÓDIGO<br>DE ACCESO";
  },1800);
}

function showError(){
  clearAllTimers();
  instruction.innerHTML="INTENTA DE NUEVO<br>EN UN MOMENTO";
  content.innerHTML=`<span class="state">ERROR</span>`;
  setTimeout(resetToKeypad,4500);
}

function clearAllTimers(){
  if(countdownInterval) clearInterval(countdownInterval);
  if(closeTimeout) clearTimeout(closeTimeout);
  countdownInterval=null;
  closeTimeout=null;
}

function resetToKeypad(){
  clearAllTimers();
  running=false;
  pin="";
  activeSession=null;
  updateDots();

  instruction.innerHTML="INGRESA TU CÓDIGO<br>DE ACCESO";
  keypad.style.display="grid";
  pinDisplay.style.display="flex";
  buttonShell.style.display="none";
}
</script>
</body>
</html>
