<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa Margarita</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f7f1e8;
      font-family: Georgia, "Times New Roman", serif;
      color: #3a2a1c;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      padding: 72px 28px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .title {
      font-size: 42px;
      line-height: 1.2;
      letter-spacing: 10px;
      font-weight: 400;
      margin: 0;
    }

    .location {
      margin-top: 24px;
      font-family: Arial, sans-serif;
      letter-spacing: 9px;
      font-size: 14px;
      color: #8a6844;
    }

    .flower {
      margin: 42px 0 58px;
      font-size: 24px;
      color: #8a6844;
    }

    .gate-button {
      width: 270px;
      height: 270px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #c8a982, #a9845d);
      color: white;
      font-family: Arial, sans-serif;
      letter-spacing: 5px;
      font-size: 26px;
      font-weight: 500;
      box-shadow:
        0 18px 35px rgba(70, 45, 20, .28),
        inset 0 8px 16px rgba(255,255,255,.25),
        inset 0 -10px 18px rgba(70,45,20,.18);
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, opacity .2s ease;
    }

    .gate-button:active {
      transform: scale(.97);
      box-shadow:
        0 10px 22px rgba(70, 45, 20, .25),
        inset 0 6px 14px rgba(70,45,20,.25);
    }

    .gate-button:disabled {
      cursor: not-allowed;
      opacity: .95;
    }

    .button-text {
      display: block;
      font-size: 25px;
      line-height: 1.35;
    }

    .count {
      display: block;
      margin-top: 12px;
      font-size: 74px;
      letter-spacing: 2px;
      line-height: 1;
    }

    .seconds {
      display: block;
      margin-top: 4px;
      font-size: 22px;
      letter-spacing: 3px;
    }

    .footer {
      margin-top: auto;
      font-family: Arial, sans-serif;
      letter-spacing: 6px;
      font-size: 12px;
      color: #8a6844;
    }

    .footer-flower {
      margin-top: 18px;
      font-size: 20px;
      color: #8a6844;
    }
  </style>
</head>
<body>
  <main class="screen">
    <h1 class="title">CASA<br>MARGARITA</h1>
    <div class="location">JALISCO · MÉXICO</div>
    <div class="flower">✽</div>

    <button id="gateButton" class="gate-button">
      <span id="buttonContent" class="button-text">ABRIR<br>PORTÓN</span>
    </button>

    <div class="footer">GRACIAS POR ELEGIR CASA MARGARITA</div>
    <div class="footer-flower">✽</div>
  </main>

  <script>
    const WORKER_URL = "https://porton.aldo-capibara.workers.dev/press?token=casa-margarita-2026";

    const button = document.getElementById("gateButton");
    const content = document.getElementById("buttonContent");

    let running = false;

    button.addEventListener("click", async () => {
      if (running) return;
      running = true;
      button.disabled = true;

      if (navigator.vibrate) navigator.vibrate(60);

      startCountdown();

      try {
        await fetch(WORKER_URL, { method: "GET" });
      } catch (error) {
        content.innerHTML = "SIN<br>CONEXIÓN";
        setTimeout(resetButton, 3000);
      }
    });

    function startCountdown() {
      let time = 30;

      updateButton(time);

      const timer = setInterval(() => {
        time--;
        updateButton(time);

        if (time <= 0) {
          clearInterval(timer);
          setTimeout(resetButton, 1000);
        }
      }, 1000);
    }

    function updateButton(time) {
      const state = time > 20 ? "ABRIENDO" : "CERRANDO";

      content.innerHTML = `
        <span class="button-text">${state}</span>
        <span class="count">${String(time).padStart(2, "0")}</span>
        <span class="seconds">S</span>
      `;
    }

    function resetButton() {
      content.innerHTML = "ABRIR<br>PORTÓN";
      button.disabled = false;
      running = false;
    }
  </script>
</body>
</html>
