<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Casa Margarita</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f1e8;
      --text: #342619;
      --muted: #9a7349;
      --line: #c7aa84;
      --button-light: #d0b28a;
      --button-mid: #b79268;
      --button-dark: #8a653f;
      --white: #fffaf2;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at 50% 22%, rgba(255,255,255,.96), rgba(247,241,232,.98) 55%, #f1e5d4 100%);
    }

    .screen {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 64px 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .brand {
      font-family: "Cormorant Garamond", serif;
      font-size: 52px;
      line-height: .98;
      letter-spacing: 10px;
      font-weight: 400;
      margin: 0;
    }

    .location {
      margin-top: 28px;
      font-family: "Montserrat", sans-serif;
      font-size: 14px;
      letter-spacing: 8px;
      color: var(--muted);
      font-weight: 400;
    }

    .divider {
      margin: 40px 0 46px;
      display: flex;
      align-items: center;
      gap: 22px;
      color: var(--muted);
    }

    .divider::before,
    .divider::after {
      content: "";
      width: 82px;
      height: 1px;
      background: var(--line);
      opacity: .9;
    }

    .daisy {
      width: 22px;
      height: 22px;
      display: inline-block;
    }

    .instruction {
      font-family: "Montserrat", sans-serif;
      font-size: 18px;
      line-height: 1.75;
      letter-spacing: 7px;
      font-weight: 400;
      margin-bottom: 44px;
      min-height: 64px;
    }

    .button-shell {
      position: relative;
      width: 274px;
      height: 274px;
      margin-bottom: auto;
      border-radius: 50%;
    }

    .button-shell::before {
      content: "";
      position: absolute;
      inset: -15px;
      border-radius: 50%;
      background: linear-gradient(145deg, #dcc39d, #a9845e);
      box-shadow:
        0 24px 42px rgba(70, 43, 18, .28),
        inset 0 7px 12px rgba(255,255,255,.38),
        inset 0 -11px 18px rgba(68,41,17,.24);
    }

    .button-shell::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1px solid rgba(68,41,17,.22);
      pointer-events: none;
    }

    .gate-button {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: none;
      background:
        radial-gradient(circle at 42% 32%, rgba(255,255,255,.12), transparent 34%),
        linear-gradient(145deg, var(--button-light), var(--button-mid) 56%, var(--button-dark));
      color: var(--white);
      font-family: "Montserrat", sans-serif;
      cursor: pointer;
      box-shadow:
        inset 0 8px 16px rgba(255,255,255,.22),
        inset 0 -13px 24px rgba(55,33,14,.28);
      transition: transform .16s ease, filter .16s ease;
    }

    .gate-button:active,
    .gate-button.working {
      transform: translateY(7px) scale(.985);
      filter: brightness(.96);
    }

    .gate-button:disabled {
      cursor: not-allowed;
    }

    .label {
      display: block;
      font-size: 29px;
      line-height: 1.35;
      letter-spacing: 6px;
      font-weight: 500;
    }

    .state {
      display: block;
      font-size: 20px;
      letter-spacing: 5px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .count {
      display: block;
      font-size: 86px;
      letter-spacing: 2px;
      line-height: .9;
      font-weight: 300;
    }

    .seconds {
      display: block;
      font-size: 18px;
      letter-spacing: 4px;
      margin-top: 12px;
      font-weight: 400;
    }

    .footer {
      margin-top: 76px;
      font-family: "Montserrat", sans-serif;
      font-size: 12px;
      letter-spacing: 5px;
      color: var(--muted);
      line-height: 1.8;
    }

    .footer-daisy {
      margin-top: 16px;
      color: var(--muted);
    }

    @media (max-height: 760px) {
      .screen { padding-top: 38px; padding-bottom: 24px; }
      .brand { font-size: 44px; letter-spacing: 9px; }
      .location { margin-top: 22px; font-size: 12px; }
      .divider { margin: 28px 0 30px; }
      .instruction { font-size: 14px; margin-bottom: 30px; min-height: 50px; }
      .button-shell { width: 236px; height: 236px; }
      .label { font-size: 24px; }
      .count { font-size: 72px; }
      .footer { margin-top: 42px; font-size: 10px; }
    }
  </style>
</head>

<body>
  <main class="screen">
    <h1 class="brand">CASA<br>MARGARITA</h1>
    <div class="location">JALISCO · MÉXICO</div>

    <div class="divider">
      <svg class="daisy" viewBox="0 0 64 64" aria-hidden="true">
        <g fill="none" stroke="currentColor" stroke-width="3">
          <ellipse cx="32" cy="12" rx="6" ry="11"/>
          <ellipse cx="32" cy="52" rx="6" ry="11"/>
          <ellipse cx="12" cy="32" rx="11" ry="6"/>
          <ellipse cx="52" cy="32" rx="11" ry="6"/>
          <ellipse cx="18" cy="18" rx="6" ry="11" transform="rotate(-45 18 18)"/>
          <ellipse cx="46" cy="46" rx="6" ry="11" transform="rotate(-45 46 46)"/>
          <ellipse cx="46" cy="18" rx="6" ry="11" transform="rotate(45 46 18)"/>
          <ellipse cx="18" cy="46" rx="6" ry="11" transform="rotate(45 18 46)"/>
          <circle cx="32" cy="32" r="6"/>
        </g>
      </svg>
    </div>

    <div id="instruction" class="instruction">
      PRESIONA CUANDO ESTÉS<br>FRENTE AL PORTÓN
    </div>

    <div class="button-shell">
      <button id="gateButton" class="gate-button" aria-label="Abrir portón">
        <span id="buttonContent" class="label">ABRIR<br>PORTÓN</span>
      </button>
    </div>

    <div class="footer">GRACIAS POR ELEGIR CASA MARGARITA</div>

    <div class="footer-daisy">
      <svg class="daisy" viewBox="0 0 64 64" aria-hidden="true">
        <g fill="none" stroke="currentColor" stroke-width="3">
          <ellipse cx="32" cy="12" rx="6" ry="11"/>
          <ellipse cx="32" cy="52" rx="6" ry="11"/>
          <ellipse cx="12" cy="32" rx="11" ry="6"/>
          <ellipse cx="52" cy="32" rx="11" ry="6"/>
          <ellipse cx="18" cy="18" rx="6" ry="11" transform="rotate(-45 18 18)"/>
          <ellipse cx="46" cy="46" rx="6" ry="11" transform="rotate(-45 46 46)"/>
          <ellipse cx="46" cy="18" rx="6" ry="11" transform="rotate(45 46 18)"/>
          <ellipse cx="18" cy="46" rx="6" ry="11" transform="rotate(45 18 46)"/>
          <circle cx="32" cy="32" r="6"/>
        </g>
      </svg>
    </div>
  </main>

  <script>
    const WORKER_URL = "https://porton.aldo-capibara.workers.dev/press?token=casa-margarita-2026";

    const button = document.getElementById("gateButton");
    const content = document.getElementById("buttonContent");
    const instruction = document.getElementById("instruction");

    let running = false;
    let timer = null;

    button.addEventListener("click", async () => {
      if (running) return;

      running = true;
      button.disabled = true;
      button.classList.add("working");

      if (navigator.vibrate) navigator.vibrate(60);

      startCountdown();

      try {
        const response = await fetch(WORKER_URL, { method: "GET", cache: "no-store" });
        const data = await response.json();

        if (!data.ok || data.result?.success === false) {
          showError();
        }
      } catch (error) {
        showError();
      }
    });

    function startCountdown() {
      let time = 30;
      updateCountdown(time);

      timer = setInterval(() => {
        time--;
        updateCountdown(time);

        if (time <= 0) {
          clearInterval(timer);
          timer = null;
          setTimeout(resetButton, 900);
        }
      }, 1000);
    }

    function updateCountdown(time) {
      const state = time > 20 ? "ABRIENDO" : "CERRANDO";
      instruction.innerHTML = `${state}<br>PORTÓN`;

      content.innerHTML = `
        <span class="state">${state}</span>
        <span class="count">${String(time).padStart(2, "0")}</span>
        <span class="seconds">SEG</span>
      `;
    }

    function showError() {
      if (timer) clearInterval(timer);
      timer = null;

      instruction.innerHTML = "INTENTA DE NUEVO<br>EN UN MOMENTO";
      content.innerHTML = `<span class="label">ERROR</span>`;

      setTimeout(resetButton, 4500);
    }

    function resetButton() {
      instruction.innerHTML = "PRESIONA CUANDO ESTÉS<br>FRENTE AL PORTÓN";
      content.innerHTML = "ABRIR<br>PORTÓN";
      button.disabled = false;
      button.classList.remove("working");
      running = false;
    }
  </script>
</body>
</html>
